services:
  db:
    image: postgres:16-alpine
    container_name: academy-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: academy_db
    ports:
      - "5432:5432"
    volumes:
      - academy_postgres_data:/var/lib/postgresql/data
volumes:
  academy_postgres_data: