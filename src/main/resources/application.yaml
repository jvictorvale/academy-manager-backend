server:
  port: 8080

security:
  jwt:
    token:
      secret-key: 53cr37
      expire-length: 3600000

spring:
  application:
    name: academy-manager-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/academy_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true