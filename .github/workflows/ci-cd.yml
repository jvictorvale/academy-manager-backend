name: CI/CD Pipeline - Academy Manager
on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixando o código do repositório
      uses: actions/checkout@v4

    - name: 2. Configurando o Java na máquina do Github
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: 3. Compilando o projeto
      run: mvn clean package -DskipTests

    - name: 4. Fazendo login no DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: 5. Constuindo a Imagem e Enviando para o DockerHub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/academy-manager-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/academy-manager-backend:${{ github.run_id }}